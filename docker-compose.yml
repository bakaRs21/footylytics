
services:
    postgres:
        image: postgres:16
        container_name: postgres_db
        restart: always
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
        - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
            interval: 30s
            timeout: 15s
            retries: 5

    backend:
        build: ./backend
        container_name: fastapi_api
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
        env_file:
            - ./backend/.env
        environment:
            - DB_HOST=postgres
            - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}
        ports:
        - "8000:8000"

    frontend:
        build: ./frontend
        container_name: nuxt_app
        restart: always
        depends_on:
            - backend
        env_file:
            - ./frontend/.env
        ports:
            - "3000:3000"
volumes:
    pgdata: