
services:
    postgres:
        image: postgres:16
        container_name: postgres_db
        restart: always
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
        - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        container_name: fastapi_api
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - DB_HOST=postgres
            - DB_PORT=${DB_PORT}
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
        ports:
        - "8000:8000"

    frontend:
        build: ./frontend
        container_name: nuxt_app
        restart: always
        depends_on:
            - backend
        env_file:
            - ./frontend/.env
        ports:
            - "3000:3000"
volumes:
    pgdata: