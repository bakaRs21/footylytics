version: "3.8"
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zelezo}
      POSTGRES_DB: ${DB_NAME:-premier_league}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data: